services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: supersecret
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - /var/lib/postgresql
    ports:
      - "5432:5432"

  server:
    image: ghcr.io/khadimcisse00/mfp-server:latest
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    depends_on:
      - db

  client:
    image: ghcr.io/khadimcisse00/mfp-client:latest
    ports:
      - "5173:5173"
    environment:
      API_URL: http://server:3000
    depends_on:
      - server